name: NihoniumOS
description: Compute registry/image metadata for builds

inputs:
  SIGNING_SECRET:
    description: "The secret used for signing the image. If not provided, the image will not be signed."
    required: false

outputs:
  LATEST_TAG:
    description: "The latest tag based on the event type"
    value: ${{ steps.set.outputs.LATEST_TAG }}

  REGISTRY:
    description: "The container registry to use"
    value: ${{ steps.set.outputs.REGISTRY }}

  REGISTRY_USER:
    description: "The user for the container registry"
    value: ${{ steps.set.outputs.REGISTRY_USER }}

  PLATFORMS:
    description: "The platforms to build for"
    value: ${{ steps.set.outputs.PLATFORMS }}

  IMAGE_PATH:
    description: "The path to the image in the registry"
    value: ${{ steps.set.outputs.IMAGE_PATH }}

  IMAGE_NAME:
    description: "The name of the image"
    value: ${{ steps.set.outputs.IMAGE_NAME }}

  IMAGE_REF:
    description: "The full reference to the image in the registry"
    value: ${{ steps.set.outputs.IMAGE_REF }}

  IS_SIGNED:
    description: "Whether the image is signed"
    value: ${{ steps.set.outputs.IS_SIGNED }}

runs:
  using: "composite"

  steps:
    - name: Set NihoniumOS variables
      id: set
      shell: bash
      env:
        SIGNING_SECRET: ${{ inputs.SIGNING_SECRET }}
      run: |
        set -euo pipefail

        #
        # REGISTRY
        #
        REGISTRY="ghcr.io"

        #
        # USER / OWNER
        #
        REGISTRY_USER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

        #
        # STATIC IMAGE NAME
        #
        IMAGE_NAME="nihoniumos"

        #
        # IMAGE PATH
        #
        IMAGE_PATH="${REGISTRY}/${REGISTRY_USER}/${IMAGE_NAME}"

        #
        # TAG LOGIC
        #
        if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
          LATEST_TAG="pr-${{ github.event.pull_request.number }}"
        elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
          LATEST_TAG="${GITHUB_REF_NAME}"
        elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
          LATEST_TAG="latest"
        else
          SAFE_BRANCH="$(echo "${GITHUB_REF_NAME}" | tr '/' '-')"
          LATEST_TAG="${SAFE_BRANCH}"
        fi

        #
        # FULL IMAGE REF
        #
        IMAGE_REF="${IMAGE_PATH}:${LATEST_TAG}"

        #
        # BUILD PLATFORMS
        #
        PLATFORMS="linux/amd64,linux/arm64"

        #
        # SIGNING
        #
        if [[ -n "${SIGNING_SECRET:-}" ]]; then
          IS_SIGNED="true"
        else
          IS_SIGNED="false"
        fi

        #
        # OUTPUTS
        #
        {
          echo "LATEST_TAG=${LATEST_TAG}"
          echo "REGISTRY=${REGISTRY}"
          echo "REGISTRY_USER=${REGISTRY_USER}"
          echo "PLATFORMS=${PLATFORMS}"
          echo "IMAGE_PATH=${IMAGE_PATH}"
          echo "IMAGE_NAME=${IMAGE_NAME}"
          echo "IMAGE_REF=${IMAGE_REF}"
          echo "IS_SIGNED=${IS_SIGNED}"
        } >> "$GITHUB_OUTPUT"
